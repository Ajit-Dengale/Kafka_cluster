apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-learning
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ajit-Dengale/Kafka_cluster.git
    targetRevision: feat/Initial-Setup
    path: kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
