image:
  repository: bitnamilegacy/kafka
  tag: 4.0.0-debian-12-r10

clusterId: "local-kafka"
kraftVersion: 1

controller:
  replicaCount: 1

broker:
  replicaCount: 1

persistence:
  enabled: false

logPersistence:
  enabled: false

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT
